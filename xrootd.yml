---
- name: Install and Configure XRootD Client with EGI Trust Anchors and VOMS
  hosts: all
  gather_facts: yes
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required dependencies
      apt:
        name:
          - wget
          - curl
          - gnupg
          - ca-certificates
          - openssl
          - python3-debian
        state: present

    - name: Download XRootD repository key (ASCII format)
      get_url:
        url: https://xrootd.web.cern.ch/repo/RPM-GPG-KEY.txt
        dest: /etc/apt/trusted.gpg.d/xrootd.asc
        mode: '0644'

    - name: Add XRootD repository using deb822 format
      deb822_repository:
        name: xrootd
        types: [deb]
        uris: "https://xrootd.web.cern.ch/{{ 'debian' if ansible_distribution == 'Debian' else 'ubuntu' }}"
        suites: ["{{ ansible_distribution_release }}"]
        components: [stable]
        signed_by: /etc/apt/trusted.gpg.d/xrootd.asc
        state: present

    - name: Update apt cache after adding XRootD repository
      apt:
        update_cache: yes

    - name: Install XRootD client
      apt:
        name:
          - xrootd-client
          - xrootd-client-plugins
        state: present

    - name: Create grid security directory
      file:
        path: /etc/grid-security
        state: directory
        mode: '0755'

    - name: Create certificates directory
      file:
        path: /etc/grid-security/certificates
        state: directory
        mode: '0755'

    # Replace EGI repository with direct CA installation
    - name: Install build dependencies for CA installation
      apt:
        name:
          - wget
          - tar
          - make
        state: present

    - name: Download IGTF CA certificates bundle
      get_url:
        url: "https://dist.eugridpma.info/distribution/igtf/current/accredited/igtf-preinstalled-bundle-classic-1.136.tar.gz"
        dest: /tmp/igtf-policy-bundle.tar.gz
        timeout: 60

    - name: Extract IGTF CA bundle
      unarchive:
        src: /tmp/igtf-policy-bundle.tar.gz
        dest: /tmp/
        remote_src: yes
        creates: /tmp/igtf-policy-installation-bundle-1.136

    - name: Configure and install CA certificates
      shell: |
        cd /tmp/igtf-policy-installation-bundle-*
        ./configure --prefix=/etc/grid-security --with-ca-dir=/etc/grid-security/certificates
        make install
      args:
        creates: /etc/grid-security/certificates/policy-igtf-classic

    - name: Set proper permissions on certificates directory
      file:
        path: /etc/grid-security/certificates
        state: directory
        mode: '0755'
        recurse: yes

    - name: Install fetch-crl from Ubuntu repositories
      apt:
        name: fetch-crl
        state: present

    - name: Install VOMS client from Ubuntu repositories
      apt:
        name:
          - voms-clients
          - voms-clients-java
        state: present

    # Remove the problematic EGI repository tasks and continue with existing VOMS setup
    - name: Create VOMS directory
      file:
        path: /etc/voms
        state: directory
        mode: '0755'

    - name: Create VOMS config directory
      file:
        path: /etc/vomses
        state: directory
        mode: '0755'

    - name: Download VOMS configuration files
      get_url:
        url: "{{ item.url }}"
        dest: "{{ item.dest }}"
        mode: '0644'
      loop:
        - url: https://raw.githubusercontent.com/WLCG-AuthZ-WG/wlcg-voms-config/master/vomses/cms-voms.cern.ch
          dest: /etc/vomses/cms-voms.cern.ch
        - url: https://raw.githubusercontent.com/WLCG-AuthZ-WG/wlcg-voms-config/master/vomses/atlas-voms.cern.ch
          dest: /etc/vomses/atlas-voms.cern.ch
        - url: https://raw.githubusercontent.com/WLCG-AuthZ-WG/wlcg-voms-config/master/vomses/alice-voms.cern.ch
          dest: /etc/vomses/alice-voms.cern.ch
        - url: https://raw.githubusercontent.com/WLCG-AuthZ-WG/wlcg-voms-config/master/vomses/lhcb-voms.cern.ch
          dest: /etc/vomses/lhcb-voms.cern.ch
      failed_when: false

    - name: Run initial CRL fetch
      command: fetch-crl
      register: fetch_crl_result
      changed_when: false
      failed_when: false

    - name: Setup fetch-crl cron job
      cron:
        name: "Fetch CRL updates"
        minute: "0"
        hour: "*/6"
        job: "/usr/sbin/fetch-crl -q"
        user: root

    - name: Create XRootD config directory
      file:
        path: /etc/xrootd
        state: directory
        mode: '0755'

    - name: Create XRootD client config
      copy:
        content: |
          # XRootD client configuration
          xrd.timeout 30
          xrd.network keepalive
        dest: /etc/xrootd/client.conf
        backup: yes

    - name: Test XRootD client installation
      command: xrdcp --version
      register: xrootd_version
      changed_when: false

    - name: Display XRootD version
      debug:
        var: xrootd_version.stdout_lines

    - name: Test VOMS client installation
      command: voms-proxy-info --version
      register: voms_version
      changed_when: false

    - name: Display VOMS version
      debug:
        var: voms_version.stdout_lines

    - name: Test grid certificate directory
      stat:
        path: /etc/grid-security/certificates
      register: cert_dir

    - name: Display certificate directory status
      debug:
        msg: "Grid certificates directory exists and contains {{ (cert_dir.stat.exists and cert_dir.stat.isdir) | ternary('certificates', 'no certificates') }}"

    - name: Display VOMS setup information
      debug:
        msg: |
          VOMS client installed successfully!
          
          To use VOMS proxies, users need to:
          1. Install their grid certificate in ~/.globus/
          2. Run: voms-proxy-init --voms <experiment>
          
          Available experiments: cms, atlas, alice, lhcb